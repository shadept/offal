<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFFAL</title>
  <style>
    /* Game-standard UI scaling: proportional to screen height.
       1.8vh ≈ 19px at 1080p, ≈ 35px at 4K. */
    html { font-size: 2.25vh; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #000;
      overflow: hidden;
    }

    #game-stack {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    #game-root,
    #ui-root {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #game-root {
      z-index: 1;
    }

    #ui-root {
      z-index: 2;
      pointer-events: none;
    }

    #game-root canvas,
    #ui-root canvas {
      display: block;
    }

    #ui-root canvas {
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-stack">
    <div id="game-root"></div>
    <div id="ui-root"></div>
  </div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('pre');
      d.style.cssText = 'color:#f44;background:#111;padding:1em;margin:1em;font-size:14px;white-space:pre-wrap;z-index:9999;position:fixed;top:0;left:0;right:0';
      d.textContent = msg + '\n' + (src || '') + ':' + line + ':' + col + '\n' + (err && err.stack || '');
      document.body.appendChild(d);
    };
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFFAL</title>
  <style>
    /* Game-standard UI scaling: proportional to screen height.
       1.5vh ≈ 16px at 1080p, ≈ 32px at 4K. */
    html { font-size: 1.5vh; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('pre');
      d.style.cssText = 'color:#f44;background:#111;padding:1em;margin:1em;font-size:14px;white-space:pre-wrap;z-index:9999;position:fixed;top:0;left:0;right:0';
      d.textContent = msg + '\n' + (src || '') + ':' + line + ':' + col + '\n' + (err && err.stack || '');
      document.body.appendChild(d);
    };
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
